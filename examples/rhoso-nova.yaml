# config file for NOVA RHOSO service
#
# PERFORMANCE METRIC: Using 'avg' (average latency across iterations)
#   - Provides average performance across all iterations

tests:
  - name: nova-performance-test

    # Use browbeat_uuid as the UUID field for Rally/Browbeat data
    uuid_field: browbeat_uuid

    # Global threshold for all metrics (percentage change to trigger regression alert)
    threshold: 10

    # Global direction for all metrics (0=both, 1=increases only, -1=decreases only)
    direction: 1

    metadata:
      # Filter by job name to get specific nova test runs
      jobName.keyword: periodic-ci-openshift-eng-ocp-qe-perfscale-ci-main-metal-rhoso-x86-weekly-rhoso-nova

      # Filter by job type
      jobType: periodic
      jobStatus: pass

    metrics:
      # NOVA - nova.attach_volume
      - name: attachVolume
        action: nova.attach_volume
        doc_type: result
        metric_of_interest: raw
        agg:
          value: duration
          agg_type: avg  # Average latency across iterations
        labels:
          - "[Jira: NOVA]"

      # NOVA - nova.boot_server
      - name: bootServer
        action: nova.boot_server
        doc_type: result
        metric_of_interest: raw
        agg:
          value: duration
          agg_type: avg  # Average latency across iterations
        labels:
          - "[Jira: NOVA]"

      # NOVA - nova.delete_image
