tests:
  - name: udn-density-pods
    metadata:
      platform: "{{ platform }}"
      clusterType: "{{ clusterType }}"
      masterNodesType: "{{ masterNodesType }}"
      masterNodesCount: "{{ masterNodesCount }}"
      workerNodesType: "{{ workerNodesType }}"
      workerNodesCount: "{{ workerNodesCount }}"
      benchmark.keyword: udn-density-pods
      wildcard:
        ocpVersion: "{{ version }}*"
      networkType: OVNKubernetes
      jobType: "{{ jobtype | default('periodic') }}"
      pullNumber: "{{ pull_number | default(0) }}"
      organization: "{{ organization | default('') }}"
      repository: "{{ repository | default('') }}"
      fips: "{{ fips | default('false') }}"
      not:
        stream: okd

    metrics:
      - name: containersStartedLatency
        metricName.keyword: podLatencyQuantilesMeasurement
        jobName.keyword: udn-density-pods
        quantileName: ContainersStarted
        labels:
          - "[Jira: PodLatency]"
        metric_of_interest: P99
        direction: 1
        threshold: 25

      - name: podReadyLatency
        metricName.keyword: podLatencyQuantilesMeasurement
        jobName.keyword: udn-density-pods
        quantileName: Ready
        metric_of_interest: P99
        not:
          jobName.keyword: "garbage-collection"
        labels:
          - "[Jira: PerfScale]"
        direction: 1
        threshold: 10

      - name: apiserverCPU
        metricName.keyword: containerCPU
        labels.namespace.keyword: openshift-kube-apiserver
        labels.container.keyword: kube-apiserver
        metric_of_interest: value
        agg:
          agg_type: avg
        labels:
          - "[Jira: kube-apiserver]"
        direction: 1
        threshold: 10

      - name: multusCPU
        metricName.keyword: containerCPU
        labels.namespace.keyword: openshift-multus
        jobName.keyword: udn-density-pods
        metric_of_interest: value
        agg:
          agg_type: avg
        labels:
          - "[Jira: multus]"
        direction: 1
        threshold: 10

      - name: monitoringCPU
        metricName.keyword: containerCPU
        labels.namespace.keyword: openshift-monitoring
        jobName.keyword: udn-density-pods
        metric_of_interest: value
        agg:
          agg_type: avg
        labels:
          - "[Jira: monitoring]"
        direction: 1
        threshold: 10

      - name: etcdCPU
        metricName.keyword: containerCPU
        labels.namespace.keyword: openshift-etcd
        labels.container.keyword: etcd
        jobName.keyword: udn-density-pods
        metric_of_interest: value
        agg:
          agg_type: avg
        labels:
          - "[Jira: etcd]"
        direction: 1
        threshold: 10

      - name: etcdWALFsyncLatency
        metricName.keyword: 99thEtcdDiskWalFsyncDurationSeconds
        jobName.keyword: udn-density-pods
        metric_of_interest: value
        agg:
          agg_type: avg
        labels:
          - "[Jira: etcd]"
        direction: 1
        threshold: 10

      - name: TXPacketsDropped
        metricName.keyword: nodeNetworkDeviceDropTXTotal
        jobName.keyword: udn-density-pods
        metric_of_interest: value
        agg:
          agg_type: avg
        labels:
          - "[Jira: Networking / ovn-kubernetes]"
        direction: 1
        threshold: 10

      - name: RXPacketsDropped
        metricName.keyword: nodeNetworkDeviceDropRXTotal
        jobName.keyword: udn-density-pods
        metric_of_interest: value
        agg:
          agg_type: avg
        labels:
          - "[Jira: Networking / ovn-kubernetes]"
        direction: 1
        threshold: 10

      - name: kubeletCPU
        metricName.keyword: kubeletCPU
        jobName.keyword: udn-density-pods
        metric_of_interest: value
        labels:
          - "[Jira: Node]"
        agg:
          agg_type: avg
        direction: 1
        threshold: 10

      - name: kubeletMemory
