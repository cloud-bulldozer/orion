# config file for OCTAVIA RHOSO service
#
# PERFORMANCE METRIC: Using 'avg' (average latency across iterations)
#   - Provides average performance across all iterations

tests:
  - name: octavia-performance-test

    # Use browbeat_uuid as the UUID field for Rally/Browbeat data
    uuid_field: browbeat_uuid

    # Global threshold for all metrics (percentage change to trigger regression alert)
    threshold: 10

    # Global direction for all metrics (0=both, 1=increases only, -1=decreases only)
    direction: 1

    metadata:
      # Filter by job name to get specific octavia test runs
      jobName.keyword: periodic-ci-openshift-eng-ocp-qe-perfscale-ci-main-metal-rhoso-x86-weekly-rhoso-octavia

      # Filter by job type
      jobType: periodic
      jobStatus: pass

    metrics:
      # OCTAVIA - octavia.load_balancer_create
      - name: loadBalancerCreate
        action: octavia.load_balancer_create
        doc_type: result
        metric_of_interest: raw
        agg:
          value: duration
          agg_type: avg  # Average latency across iterations
        labels:
          - "[Jira: OCTAVIA]"

      # OCTAVIA - octavia.wait_for_loadbalancers
      - name: waitForLoadbalancers
        action: octavia.wait_for_loadbalancers
        doc_type: result
        metric_of_interest: raw
        agg:
          value: duration
          agg_type: avg  # Average latency across iterations
        labels:
          - "[Jira: OCTAVIA]"

