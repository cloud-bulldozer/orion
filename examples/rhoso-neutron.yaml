# config file for NEUTRON RHOSO service
#
# PERFORMANCE METRIC: Using 'avg' (average latency across iterations)
#   - Provides average performance across all iterations

tests:
  - name: neutron-performance-test

    # Use browbeat_uuid as the UUID field for Rally/Browbeat data
    uuid_field: browbeat_uuid

    # Global threshold for all metrics (percentage change to trigger regression alert)
    threshold: 10

    # Global direction for all metrics (0=both, 1=increases only, -1=decreases only)
    direction: 1

    metadata:
      # Filter by job name to get specific neutron test runs
      jobName.keyword: periodic-ci-openshift-eng-ocp-qe-perfscale-ci-main-metal-rhoso-x86-weekly-rhoso-neutron

      # Filter by job type
      jobType: periodic
      jobStatus: pass

    metrics:
      # NEUTRON - neutron._add_subports_to_trunk
      - name: AddSubportsToTrunk
        action: neutron._add_subports_to_trunk
        doc_type: result
        metric_of_interest: raw
        agg:
          value: duration
          agg_type: avg  # Average latency across iterations
        labels:
          - "[Jira: NEUTRON]"

      # NEUTRON - neutron.create_network
      - name: createNetwork
        action: neutron.create_network
        doc_type: result
        metric_of_interest: raw
        agg:
          value: duration
          agg_type: avg  # Average latency across iterations
        labels:
          - "[Jira: NEUTRON]"

      # NEUTRON - neutron.create_port
      - name: createPort
        action: neutron.create_port
        doc_type: result
        metric_of_interest: raw
        agg:
          value: duration
          agg_type: avg  # Average latency across iterations
        labels:
          - "[Jira: NEUTRON]"

      # NEUTRON - neutron.create_router
      - name: createRouter
        action: neutron.create_router
        doc_type: result
        metric_of_interest: raw
        agg:
          value: duration
          agg_type: avg  # Average latency across iterations
        labels:
          - "[Jira: NEUTRON]"

      # NEUTRON - neutron.create_security_group
