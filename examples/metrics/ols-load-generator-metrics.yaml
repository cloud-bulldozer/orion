# Metrics common to ols-load-generator.yaml
#
# Example files where these metrics appear:
#   ols-load-generator.yaml

# Latency Metrics
- name: postQuery
  metricName.keyword: post_query
  metric_of_interest: p99Latency
  direction: 1
  threshold: 10
  context: 10
  correlation: postQuery_statusCodes.200

- name: postStreamingQuery
  metricName.keyword: post_streaming_query
  metric_of_interest: p99Latency
  direction: 1
  threshold: 10
  context: 10
  correlation: postStreamingQuery_statusCodes.200

- name: postQueryWithCache
  metricName.keyword: post_query_with_cache
  metric_of_interest: p99Latency
  direction: 1
  threshold: 10
  context: 10
  correlation: postQueryWithCache_statusCodes.200

- name: postStreamingQueryWithCache
  metricName.keyword: post_streaming_query_with_cache
  metric_of_interest: p99Latency
  direction: 1
  threshold: 10
  context: 10
  correlation: postStreamingQueryWithCache_statusCodes.200

- name: getFeedbackStatus
  metricName.keyword: get_feedback_status
  metric_of_interest: p99Latency
  direction: 1
  threshold: 10
  context: 10
  correlation: getFeedbackStatus_statusCodes.200

- name: postFeedback
  metricName.keyword: post_feedback
  metric_of_interest: p99Latency
  direction: 1
  threshold: 10
  context: 10
  correlation: postFeedback_statusCodes.200

- name: postAuthorized
  metricName.keyword: post_authorized
  metric_of_interest: p99Latency
  direction: 1
  threshold: 10
  context: 10
  correlation: postAuthorized_statusCodes.200

- name: getLiveness
  metricName.keyword: get_liveness
  metric_of_interest: p99Latency
  direction: 1
  threshold: 10
  context: 10
  correlation: getLiveness_statusCodes.200

- name: getReadiness
  metricName.keyword: get_readiness
  metric_of_interest: p99Latency
  direction: 1
  threshold: 10
  context: 10
  correlation: getReadiness_statusCodes.200

- name: getMetrics
  metricName.keyword: get_metrics
  metric_of_interest: p99Latency
  direction: 1
  threshold: 10
  context: 10
  correlation: getMetrics_statusCodes.200

