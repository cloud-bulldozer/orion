metricsFile: metrics.yaml
tests:
  - name: node-density
    metadata:
      platform: "{{ platform }}"
      clusterType: "{{ clusterType }}"
      masterNodesType: "{{ masterNodesType }}"
      masterNodesCount: "{{ masterNodesCount }}"
      workerNodesType: "{{ workerNodesType }}"
      workerNodesCount: "{{ workerNodesCount }}"
      benchmark.keyword: node-density
      wildcard:
        ocpVersion: "{{ version }}*"
      networkType: OVNKubernetes
      jobType: "{{ jobtype | default('periodic') }}"
      pullNumber: "{{ pull_number | default(0) }}"
      organization: "{{ organization | default('') }}"
      repository: "{{ repository | default('') }}"
      fips: "{{ fips | default('false') }}"
      not:
        stream: okd

    metrics:
      - name: kubeBurnerVersion
        metricName.keyword: jobSummary
        metric_of_interest: k8sVersion
        not:
          jobName.keyword: "garbage-collection"
        type: metadata

      - name: containersStartedLatency
        metricName.keyword: podLatencyQuantilesMeasurement
        quantileName: ContainersStarted
        labels:
          - "[Jira: PodLatency]"
        metric_of_interest: P99
        direction: 1
        threshold: 25
