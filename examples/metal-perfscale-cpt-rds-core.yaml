tests:
  - name: metal-perfscale-cpt-rds-core
    metadata:
      platform: BareMetal
      clusterType: self-managed
      masterNodesCount: 3
      workerNodesCount: 6
      ocpVersion: "{{ version }}"
      benchmark.keyword: "rds-core"
      networkType: OVNKubernetes
      pullNumber: "{{ pull_number | default(0) }}"
      organization: "{{ organization | default('') }}"
      repository: "{{ repository | default('') }}"
      fips: "{{ fips | default('false') }}"
      not:
        stream: okd
    metrics:
      - name: podReadyLatency
        metricName.keyword: podLatencyQuantilesMeasurement
        quantileName: Ready
        metric_of_interest: P99
        not:
          jobConfig.name: "garbage-collection"
        labels:
          - "[Jira: PodReadyLatency]"
        agg:
          value: P99
          agg_type: avg
        direction: 1
        threshold: 10
      - name: max-cpu-kubelet
        metricName.keyword: max-cpu-kubelet
        metric_of_interest: value
        labels:
          - "[Jira: kubelet_cpu_max_worker]"
        agg:
          value: cpu
          agg_type: max
        direction: 1
        threshold: 10
      - name: cpu-kubelet
        metricName.keyword: cpu-kubelet
        metric_of_interest: value
        labels:
          - "[Jira: kubelet_cpu_avg_worker]"
        agg:
          value: cpu-kubelet
          agg_type: avg
        direction: 1
        threshold: 10
      - name: max-memory-kubelet
        metricName.keyword: max-memory-kubelet
        metric_of_interest: value
        labels:
          - "[Jira: kubelet_mem_max_worker]"
        agg:
          value: max-memory-kubelet
          agg_type: max
        direction: 1
        threshold: 10
      - name: memory-kubelet
        metricName.keyword: memory-kubelet
        metric_of_interest: value
        labels:
          - "[Jira: kubelet_mem_avg_worker]"
        agg:
          value: memory-kubelet
          agg_type: avg
        direction: 1
        threshold: 10
      - name: max-cpu-crio
        metricName.keyword: max-cpu-crio
        metric_of_interest: value
        labels:
          - "[Jira: crio_cpu_max_worker]"
        agg:
          value: max-cpu-crio
          agg_type: max
        direction: 1
        threshold: 10
      - name: cpu-crio
        metricName.keyword: cpu-crio
        metric_of_interest: value
        labels:
          - "[Jira: crio_cpu_avg_worker]"
        agg:
          value: cpu-crio
          agg_type: avg
        direction: 1
        threshold: 10
      - name: max-memory-crio
        metricName.keyword: max-memory-crio
        metric_of_interest: value
        labels:
          - "[Jira: crio_mem_max_worker]"
        agg:
          value: max-memory-crio
          agg_type: max
        direction: 1
        threshold: 10
      - name: memory-crio
        metricName.keyword: memory-crio
        metric_of_interest: value
        labels:
