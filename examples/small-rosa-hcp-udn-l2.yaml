tests:
  - name: rosa-hcp-small-scale-udn-density-l2-pods
    metadata:
      platform: AWS
      clusterType: rosa-hcp
      workerNodesType: m6i.xlarge
      workerNodesCount: 24
      benchmark.keyword: udn-density-pods
      ocpVersion: "{{ version }}"
      networkType: OVNKubernetes
      jobType: "{{ jobtype | default('periodic') }}"
      pullNumber: "{{ pull_number | default(0) }}"
      organization: "{{ organization | default('') }}"
      repository: "{{ repository | default('') }}"
    metrics:
      - name: podReadyLatency
        metricName.keyword: podLatencyQuantilesMeasurement
        quantileName: Ready
        metric_of_interest: P99
        not:
          jobConfig.name: "garbage-collection"
        labels:
          - "[Jira: PerfScale]"
        direction: 1
        threshold: 10

      - name: containersStartedLatency
        metricName.keyword: podLatencyQuantilesMeasurement
        quantileName: ContainersStarted
        labels:
          - "[Jira: PodLatency]"
        metric_of_interest: P99
        direction: 1
        threshold: 25

      - name: etcdDisk
        metricName.keyword: 99thEtcdDiskBackendCommitDurationSeconds
        metric_of_interest: value
        agg:
          value: duration
          agg_type: avg
        labels:
          - "[Jira: etcd]"
        direction: 1
        threshold: 10

      - name: apiserverCPU
        metricName.keyword: podCPU-Controlplane
        labels.container.keyword: kube-apiserver
        metric_of_interest: value
        agg:
          value: cpu
          agg_type: avg
        labels:
          - "[Jira: kube-apiserver]"
        direction: 1
        threshold: 10

      - name: apiserverMemory
        metricName.keyword: podMemory-Controlplane
        labels.container.keyword: kube-apiserver
        metric_of_interest: value
        agg:
          value: memory
          agg_type: max
        labels:
          - "[Jira: kube-apiserver]"
        direction: 1
        threshold: 10

      - name: ovnCPU
        metricName.keyword: podCPU-Controlplane
        labels.container.keyword: ovnkube-control-plane
        metric_of_interest: value
        agg:
          value: cpu
          agg_type: avg
        labels:
          - "[Jira: Networking / ovn-kubernetes]"
        direction: 1
        threshold: 10

      - name: etcdCPU
        metricName.keyword: podCPU-Controlplane
        labels.container.keyword: etcd
        metric_of_interest: value
        agg:
          value: cpu
          agg_type: avg
        labels:
          - "[Jira: etcd]"
        direction: 1
        threshold: 10

      - name: etcdMemory
        metricName.keyword: podMemory-Controlplane
        labels.container.keyword: etcd
        metric_of_interest: value
        agg:
          value: memory
          agg_type: max
        labels:
          - "[Jira: etcd]"
        direction: 1
        threshold: 10

      - name: kubelet
        metricName.keyword: kubeletCPU
        metric_of_interest: value
        labels:
          - "[Jira: Node]"
        agg:
          value: cpu
          agg_type: avg
        direction: 1
        threshold: 10
