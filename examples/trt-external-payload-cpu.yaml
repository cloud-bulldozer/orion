tests:
  - name: payload-{{benchmark}}-scale
    metadata:
      platform: AWS
      clusterType: self-managed
      masterNodesType: m6a.xlarge
      masterNodesCount: 3
      workerNodesType: m6a.xlarge
      workerNodesCount: 6
      benchmark.keyword: "{{ benchmark }}"
      wildcard:
        ocpVersion: "{{ version }}*"
      networkType: OVNKubernetes
      jobType: "{{ jobtype | default('periodic') }}"
      pullNumber: "{{ pull_number | default(0) }}"
      organization: "{{ organization | default('') }}"
      repository: "{{ repository | default('') }}"
      fips: "{{ fips | default('false') }}"
      not:
        stream: okd

    metrics:
      - name: openshiftMonitoringNsCPU
        metricName.keyword: containerCPU
        labels.namespace.keyword: openshift-monitoring
        metric_of_interest: value
        agg:
          value: cpu
          agg_type: avg
        direction: 1
        threshold: 10
      - name: openshiftOvnKubernetesNsCPU
        metricName.keyword: containerCPU
        labels.namespace.keyword: openshift-ovn-kubernetes
