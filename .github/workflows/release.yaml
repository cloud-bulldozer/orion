name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install .

      - name: Bake version
        run: echo "__version__ = \"${GITHUB_REF#refs/tags/}\"" > version.py

      - name: Build standalone binary
        run: |
          pyinstaller \
            --onefile \
            --name orion \
            --collect-submodules orion \
            --collect-submodules otava \
            --hidden-import orion.algorithms.edivisive.edivisive \
            --hidden-import orion.algorithms.cmr.cmr \
            --hidden-import orion.algorithms.isolationforest.isolationForest \
            main.py

      - name: Upload binary to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: dist/orion
